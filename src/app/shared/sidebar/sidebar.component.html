<nav class="sidebar" aria-label="Navigation connectee">
  <a class="sidebar__brand" [routerLink]="dashboardRoute" (click)="navigate.emit()">
    <img src="assets/home/cmda-logo.svg" alt="Logo CMDA DEV">
    <span>
      <strong>CMDA DEV</strong>
      <small>{{ scopeLabel }}</small>
    </span>
  </a>

  <div class="sidebar__section">
    <p class="sidebar__section-title">Principal</p>
    <ul class="sidebar__nav">
      <li>
        <a [routerLink]="dashboardRoute" routerLinkActive="is-active" (click)="navigate.emit()">
          <i class="bi bi-speedometer2"></i>
          <span>{{ primarySpaceLabel }}</span>
        </a>
      </li>

      <li *ngIf="showMembersMenu()">
        <a routerLink="/app/members" routerLinkActive="is-active" (click)="navigate.emit()">
          <i class="bi bi-people"></i>
          <span>Membres</span>
        </a>
      </li>

      <li *ngIf="showUserManagementMenu()">
        <a routerLink="/app/users" routerLinkActive="is-active" (click)="navigate.emit()">
          <i class="bi bi-person-gear"></i>
          <span>Utilisateurs</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="sidebar__section" *ngIf="showStructureMenu() || showFraternityMenu()">
    <p class="sidebar__section-title">Perimetre</p>
    <ul class="sidebar__nav">
      <li *ngIf="showStructureMenu()">
        <a *ngIf="hasRole('ADMIN'); else disabledStructures" routerLink="/app/admin/structures" routerLinkActive="is-active" (click)="navigate.emit()">
          <i class="bi bi-diagram-3"></i>
          <span>Structures</span>
        </a>
        <ng-template #disabledStructures>
          <span class="sidebar__item sidebar__item--disabled">
            <i class="bi bi-diagram-3"></i>
            <span>Structures</span>
          </span>
        </ng-template>
      </li>
      <li *ngIf="showFraternityMenu()">
        <span class="sidebar__item sidebar__item--disabled">
          <i class="bi bi-house-heart"></i>
          <span>Fraternites</span>
        </span>
      </li>
    </ul>
  </div>

  <button type="button" class="sidebar__logout" (click)="logout()">
    <i class="bi bi-box-arrow-right"></i>
    <span>Deconnexion</span>
  </button>
</nav>
